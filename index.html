<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>QQ音乐金牌制作人：从零开始的偶像企划</title>

<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--ag:#CCFF00;--ap:#FF2D78;--au:#A855F7;--ac:#00F5FF;--ao:#FF6B00;--ay:#FFE500;--bg:#0A0A0A;--tp:#F5F5F5;--ts:#888}
html{scroll-behavior:smooth}
body{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei','Hiragino Sans GB','Helvetica Neue',Arial,sans-serif;background:var(--bg);color:var(--tp);min-height:100dvh;overflow-x:hidden;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--ag);border-radius:2px}
@keyframes su{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
@keyframes gl{0%{text-shadow:2px 0 var(--ap),-2px 0 var(--ac)}50%{text-shadow:-2px 2px var(--ap),2px -2px var(--ac)}100%{text-shadow:2px 0 var(--ap),-2px 0 var(--ac)}}
@keyframes pl{0%,100%{opacity:1}50%{opacity:.5}}
@keyframes bg{0%,100%{border-color:var(--ag);box-shadow:0 0 8px #ccff004d}33%{border-color:var(--ap);box-shadow:0 0 8px #ff2d784d}66%{border-color:var(--ac);box-shadow:0 0 8px #00f5ff4d}}
@keyframes cf{0%{transform:translateY(-10vh) rotate(0);opacity:1}100%{transform:translateY(110vh) rotate(720deg);opacity:0}}
.ce{animation:su .5s cubic-bezier(.16,1,.3,1) both}
.gt{animation:gl .3s ease infinite}
.no{position:fixed;inset:0;pointer-events:none;z-index:9999;opacity:.03;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E")}
#app{position:relative;transition:opacity .3s}
.page{min-height:100dvh;display:flex;flex-direction:column;align-items:center;padding:70px 18px 40px;position:relative}
.page.hs{padding-bottom:145px}.page.intro{justify-content:center;padding:40px 18px;height:100dvh;min-height:auto;overflow:hidden}
.inn{width:100%;max-width:420px}
.btn{width:100%;text-align:left;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.02);border-radius:14px;padding:14px 16px;cursor:pointer;transition:all .3s;color:var(--tp);position:relative;overflow:hidden;display:flex;gap:10px;align-items:flex-start;font-family:inherit;font-size:15px}
.btn:active{background:rgba(255,255,255,.06);border-color:var(--ag);transform:translateY(-2px);box-shadow:0 0 20px rgba(204,255,0,.08)}
@media(hover:hover){.btn:hover{background:rgba(255,255,255,.06);border-color:var(--ag);transform:translateY(-2px);box-shadow:0 0 20px rgba(204,255,0,.08)}}
.btn .be{font-size:24px;flex-shrink:0;line-height:1}.btn .bt{font-weight:900;font-size:15px;margin-bottom:3px;color:var(--tp)}
.btn:active .bt{color:var(--ag)}
@media(hover:hover){.btn:hover .bt{color:var(--ag)}}.btn .bd{font-size:13px;color:var(--ts);line-height:1.5}
.btn .bg2{font-size:12px;margin-top:5px;font-style:italic;opacity:.8;color:var(--ag)}
.choices{display:flex;flex-direction:column;gap:7px}
.pbar{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(10,10,10,.9);backdrop-filter:blur(10px)}
.pfill{height:3px;background:linear-gradient(90deg,var(--ag),var(--ac),var(--ap));transition:width .6s cubic-bezier(.16,1,.3,1);box-shadow:0 0 15px #ccff0080}
.pinfo{display:flex;justify-content:space-between;padding:5px 16px;font-size:9px;letter-spacing:2px;color:var(--ts)}
.sbar{display:flex;gap:5px;padding:3px 0;width:100%}
.si{flex:1;background:rgba(255,255,255,.04);border-radius:10px;padding:4px 3px;text-align:center;border:1px solid rgba(255,255,255,.06)}
.si .sv{font-weight:900}.si .sl{font-size:8px;color:var(--ts);letter-spacing:1px}
.bstats{position:fixed;bottom:0;left:0;right:0;z-index:100;background:rgba(10,10,10,.92);backdrop-filter:blur(10px);padding:1px 12px 3px;border-top:1px solid rgba(255,255,255,.05)}
.bsi{max-width:420px;margin:0 auto}
.ecard{background:rgba(255,255,255,.03);border-radius:16px;padding:16px 14px;margin-bottom:12px;border:1px solid rgba(255,255,255,.06);text-align:center}
.toast{position:fixed;bottom:25px;left:50%;transform:translateX(-50%);background:rgba(20,20,20,.95);border:1px solid rgba(255,255,255,.1);border-radius:14px;padding:10px 18px;z-index:200;backdrop-filter:blur(20px);display:flex;gap:14px;box-shadow:0 20px 60px rgba(0,0,0,.5)}
a.cta{display:block;width:100%;background:linear-gradient(135deg,var(--ag),var(--ac));color:#000;padding:14px;border-radius:100px;font-size:14px;font-weight:900;text-align:center;text-decoration:none;letter-spacing:1px;box-shadow:0 0 30px #ccff0040;font-family:inherit}
.nbadge{display:inline-flex;align-items:center;gap:5px;background:rgba(255,45,120,.1);padding:4px 12px;border-radius:100px;margin-bottom:8px;font-size:10px;color:var(--ap);font-weight:700;letter-spacing:1px}
</style>
</head>

function getEnd(s){
  var f=s.f,p=s.p,c=s.c,t=f+p+c,mn=Math.min(f,p,c),mx=Math.max(f,p,c);
  // ===== 极端负面 =====
  if(mn<=-15)return ENDS[16];
  if(c<=-20)return ENDS[15];
  if(c<=-10)return ENDS[14];
  if(f<=-10&&p<=-10)return ENDS[7];
  if(t<=-10)return ENDS[16];
  if(mn<=-5)return ENDS[7];
  if(c<=0&&t<200)return ENDS[14]; // 资本负→鹤岗
  if(mn<=5&&t<180)return ENDS[7]; // 全面低→塌房
  // ===== 低分 t<200 (~5%) =====
  if(t<180)return ENDS[19]; // 消失
  if(t<220)return ENDS[4]; // 种地
  // ===== 被反噬 =====
  if(c<0&&f>100&&p>100)return ENDS[17];
  // ===== 结婚 =====
  if(G.bond>=6&&f>=30&&p>=20&&c>=10)return ENDS[20];
  // ===== t>=600: 紫微星（极稀有 ~3%）=====
  if(t>=600&&mn>=120)return ENDS[0];
  // ===== t>=500: 传说级 (~10%) =====
  if(t>=500){
    if(mn>=100)return ENDS[0]; // 紫微星（均衡型）
    if(f>=p&&f>=c){return f>=200?ENDS[1]:ENDS[25];} // 养成/二代目
    if(p>=f&&p>=c){
      if(p>=200)return ENDS[8]; // 综艺帝国
      if(f>=50&&c>=50)return ENDS[21]; // 从政
      return ENDS[5]; // 海外爆红
    }
    if(c>=150)return ENDS[22]; // 合并
    return ENDS[25]; // 二代目
  }
  // ===== t>=400: 高段 (~30%) =====
  if(t>=400){
    if(mx-mn>=150)return ENDS[9]; // 涅槃
    if(f>=180&&p<60)return ENDS[6]; // 小众封神
    if(p>=160&&f<60)return ENDS[2]; // 搞笑通告
    if(c>=130&&f<60)return ENDS[3]; // 带货
    if(p>=150&&f<50&&c>=80)return ENDS[24]; // 黑红
    if(p>=140&&f>=40&&f<=100)return ENDS[23]; // 改编动漫
    if(c>=100&&p>=100)return ENDS[22]; // 合并
    if(f>=130&&c>=90)return ENDS[25]; // 二代目
    if(c>=90&&f>=40&&p>=40)return ENDS[12]; // 培训教父
    if(c>=80&&p>=80&&f<40)return ENDS[11]; // 虚拟偶像
    if(p>=110&&f<50&&c<50)return ENDS[13]; // 互联网活化石
    if(f<60&&p>=60&&c>=30)return ENDS[10]; // 恋情线
    if(f>=p&&f>=c)return ENDS[6]; // 小众封神
    if(p>=f&&p>=c)return ENDS[23]; // 改编动漫
    return ENDS[12]; // 培训教父
  }
  // ===== t>=300: 中段（最常见 ~30%）=====
  if(t>=300){
    if(mx-mn>=100)return ENDS[9]; // 涅槃
    if(f>=100&&p<40)return ENDS[6]; // 小众封神
    if(p>=100&&f<40)return ENDS[2]; // 搞笑通告
    if(c>=80&&f<40)return ENDS[3]; // 带货
    if(c>=60&&p>=60&&f<30)return ENDS[11]; // 虚拟偶像
    if(p>=80&&f<30&&c<30)return ENDS[13]; // 互联网活化石
    if(f<40&&p>=40&&c>=25)return ENDS[10]; // 恋情线
    if(c>=60&&f>=30&&p>=30)return ENDS[12]; // 培训教父
    if(p>=70&&f>=30)return ENDS[23]; // 改编动漫
    if(f>=p&&f>=c)return ENDS[10]; // 恋情线
    if(p>=f&&p>=c)return ENDS[13]; // 活化石
    return ENDS[27]; // 重新出发
  }
  // ===== t>=220: 中低段 (~15%) =====
  if(t>=220){
    if(Math.abs(f-p)<=20&&Math.abs(p-c)<=20&&mx<=90)return ENDS[18]; // 出家
    if(mx<=100&&mn>=15)return ENDS[26]; // 写书
    if(mx-mn>=40)return ENDS[27]; // 重新出发
    if(f>=p&&f>=c)return ENDS[10]; // 恋情线
    if(p>=f&&p>=c)return ENDS[13]; // 活化石
    return ENDS[26]; // 写书
  }
  // ===== t<220 但>种地线 =====
  if(Math.abs(f-p)<=15&&Math.abs(p-c)<=15)return ENDS[18]; // 出家
  if(mx-mn>=30)return ENDS[27]; // 重新出发
  return ENDS[26]; // 写书
}

function shuf(a){var b=a.slice();for(var i=b.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var tmp=b[i];b[i]=b[j];b[j]=tmp;}return b;}
// Pick events: prioritize ones matching player choices, fill rest randomly
function pickEvents(count,usedArr){
  var used=usedArr.map(function(x){return EVTS.indexOf(x);});
  var avail=EVTS.filter(function(_,i){return used.indexOf(i)<0;});
  // Separate matched vs unmatched
  var matched=[];var unmatched=[];
  avail.forEach(function(ev){
    if(ev.cond){
      var key=Object.keys(ev.cond)[0];
      if(key==='bond'){
        if(G.bond>=ev.cond[key]){matched.push(ev);}
      }else if(G.choices[key]===ev.cond[key]){matched.push(ev);}
      else{unmatched.push(ev);}
    }else{unmatched.push(ev);}
  });
  // Shuffle both
  matched=shuf(matched);unmatched=shuf(unmatched);
  // Take matched first (max 2), then fill from unmatched
  var result=matched.slice(0,Math.min(2,count));
  var need=count-result.length;
  result=result.concat(unmatched.slice(0,need));
  return shuf(result);
}
function addS(s){
  G.stats.f=G.stats.f+(s.f||0);
  G.stats.p=G.stats.p+(s.p||0);
  var cBonus=0;
  if(s.c>0&&G.stats.f>0){cBonus=Math.floor(G.stats.f/30);}
  if(s.c>0&&G.stats.p>0){cBonus+=Math.floor(G.stats.p/40);}
  G.stats.c=G.stats.c+(s.c||0)+cBonus;
  if(s.addBond)G.bond=G.bond+(s.addBond||0);
}


// roundRect polyfill for older mobile browsers
if(!CanvasRenderingContext2D.prototype.roundRect){
  CanvasRenderingContext2D.prototype.roundRect=function(x,y,w,h,r){
    if(typeof r==="number")r={tl:r,tr:r,br:r,bl:r};
    this.beginPath();this.moveTo(x+r.tl,y);this.lineTo(x+w-r.tr,y);
    this.quadraticCurveTo(x+w,y,x+w,y+r.tr);this.lineTo(x+w,y+h-r.br);
    this.quadraticCurveTo(x+w,y+h,x+w-r.br,y+h);this.lineTo(x+r.bl,y+h);
    this.quadraticCurveTo(x,y+h,x,y+h-r.bl);this.lineTo(x,y+r.tl);
    this.quadraticCurveTo(x,y,x+r.tl,y);this.closePath();return this;
  };
}

      for(var cc=0;cc<modCount;cc++){
        if(qr.isDark(r,cc)){
          ctx.fillRect(Math.round(qx+cc*cellSize),Math.round(qy+r*cellSize),Math.ceil(cellSize),Math.ceil(cellSize));
        }
      }
    }
    cb(cv.toDataURL("image/png"));
  }catch(e){
    // QR生成失败兜底
    ctx.fillStyle="#000";ctx.font="bold 14px sans-serif";ctx.textAlign="center";
    ctx.fillText("请直接访问",W/2,qrY+100);
    ctx.font="11px sans-serif";
    ctx.fillText("y.qq.com/viber_pub/idolproducer",W/2,qrY+125);
    cb(cv.toDataURL("image/png"));
  }
}
function wrapText(ctx,text,maxW){
  var lines=[];var line="";
  for(var i=0;i<text.length;i++){
    var test=line+text[i];
    if(ctx.measureText(test).width>maxW&&line){lines.push(line);line=text[i];}
    else{line=test;}
  }
  if(line)lines.push(line);
  return lines;
}

function checkAndRecordGame(endingId){
  var save=loadSave();
  save.playCount=(save.playCount||0)+1;
  save.endings=save.endings||{};
  save.endings[endingId]=(save.endings[endingId]||0)+1;
  save.achievements=save.achievements||{};
  var newlyUnlocked=[];
  function unlock(aid){if(!save.achievements[aid]){save.achievements[aid]=Date.now();newlyUnlocked.push(aid);}}
  // 各项成就判定
  unlock("first");
  var s=G.stats;
  if(s.f>=50&&s.p>=50&&s.c>=50)unlock("crown");
  if(s.c<0)unlock("bankrupt");
  if(endingId==="marry"||endingId==="love")unlock("love");
  if(endingId==="god")unlock("god");
  if(endingId==="mogul")unlock("variety");
  var unlockedEndingsCount=Object.keys(save.endings).length;
  if(unlockedEndingsCount>=10)unlock("wiki");
  if(unlockedEndingsCount>=ENDS.length)unlock("legend");
  if(save.playCount>=5)unlock("agent");
  if(save.playCount>=20)unlock("master");
  saveSave(save);
  return{save:save,newlyUnlocked:newlyUnlocked};
}
